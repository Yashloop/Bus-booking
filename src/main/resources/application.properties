# ======================================================
#  Bus Booking Application – Application Properties
#  Owner: Backend-1 (Auth + Users)
# ======================================================

# Server Configuration
server.port=8080

# ==================== Database Configuration ====================
# Aiven MySQL Cloud Database
spring.datasource.url=jdbc:mysql://mysql-3ad9c4fb-yashbala9688-f5b9.a.aivencloud.com:22729/bus_booking?useSSL=true&requireSSL=true
spring.datasource.username=${your-username}
spring.datasource.password=${AIVEN_PASSWORD:your-aiven-password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Configuration for MySQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL Init — runs schema.sql on every startup (CREATE TABLE IF NOT EXISTS = safe)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==================== JWT Configuration ====================
jwt.secret=${JWT_SECRET:WW91clN1cGVyU2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb25NdXN0QmVBdExlYXN0MjU2Qml0c0xvbmdGb3JIUzI1NkFsZ29yaXRobQ==}
jwt.expiration=86400000

# ==================== CORS Configuration ====================
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ==================== Swagger / OpenAPI Configuration ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false

# ==================== Email Configuration (Gmail SMTP) ====================
# Replace with your actual email credentials before using
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.busbooking=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=bus-booking-app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
